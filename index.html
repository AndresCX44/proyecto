<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Examen tercer Parcial</title>
</head>
<body>
    <h1>Examen tercer parcial desarrollo web</h1>
    <!--ECUACIÓN-->
    <h2>Ecuación de Segundo Grado</h2>
    <label>A:</label>
    <input type="number" id="a">
    <label>B:</label>
    <input type="number" id="b">
    <label>C:</label>
    <input type="number" id="c">
    <button onclick="calcularEcuacion()">Calcular Ecuacion</button>
    <p id="respuestaEcuacion"></p>
    <!--FACTORIAL-->
    <h2>Factorial</h2>
    <label>Número:</label>
    <input type="number" id="num">
    <button onclick="calcularFactorial()">Calcular</button>
    <p id="respuestaFactorial"></p>

    <script src="js/script.js"></script>
</body>
</html>
